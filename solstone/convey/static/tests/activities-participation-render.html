      "bad_shape": "{\n  \"foo\": \"bar\"\n}\n"
    };

    const summary = document.getElementById('test-results');
    const results = document.getElementById('results');
    const copy = window.solActivitiesCopy;
    let failures = 0;

    function report(name, ok, detail) {
      const item = document.createElement('li');
      item.className = ok ? 'pass' : 'fail';
      item.textContent = `${ok ? 'PASS' : 'FAIL'} ${name}${detail ? ` — ${detail}` : ''}`;
      results.appendChild(item);
      if (!ok) failures += 1;
    }

    function assert(name, condition) {
      report(name, !!condition);
    }

    function renderFixture(name) {
      const host = document.createElement('div');
      host.innerHTML = window.solActivitiesParticipation.render(FIXTURES[name]);
      return host;
    }

    function cards(host) {
      return Array.from(host.querySelectorAll('.ad-participation-card'));
    }

    function cardFor(host, name) {
      return cards(host).find((card) => card.querySelector('.ad-participation-name')?.textContent === name) || null;
    }

    function headers(host) {
      return Array.from(host.querySelectorAll('.ad-participation-section-header')).map((el) => el.textContent);
    }

    function text(host) {
      return host.textContent || '';
    }

    function assertNoRawJson(name, host) {
      const html = host.innerHTML;
      assert(`AC1 ${name} no pre block`, !html.includes('<pre'));
      assert(`AC1 ${name} no raw JSON keys`, !html.includes('"role":') && !html.includes('"source":') && !html.includes('"confidence":'));
    }

    function runTests() {
      const allSources = renderFixture('all_sources');
      const mixed = renderFixture('mixed_sections');
      const confidence = renderFixture('confidence_boundary');
      const empty = renderFixture('empty');
      const malformed = renderFixture('malformed');
      const unknown = renderFixture('unknown_source');
      const large = renderFixture('large_200');
      const missingConfidence = renderFixture('missing_confidence');
      const shapeMismatch = renderFixture('shape_mismatch');
      const badShape = renderFixture('bad_shape');

      [
        ['mixed_sections', mixed],
        ['confidence_boundary', confidence],
        ['unknown_source', unknown],
        ['large_200', large],
        ['empty', empty],
        ['malformed', malformed],
        ['bad_shape', badShape],
        ['shape_mismatch', shapeMismatch],
        ['missing_confidence', missingConfidence]
      ].forEach(([name, host]) => assertNoRawJson(name, host));

      assert('AC1 renders structured participation root', !!allSources.querySelector('.ad-participation'));
      assert('AC2 voice provenance phrase', text(allSources).includes(copy.provVoice));
      assert('AC2 speaker label provenance phrase', text(allSources).includes(copy.provSpeakerLabel));
      assert('AC2 transcript provenance phrase', text(allSources).includes(copy.provTranscript));
      assert('AC2 screen provenance phrase', text(allSources).includes(copy.provScreen));
      assert('AC2 other provenance phrase', text(allSources).includes(copy.provOther));
      assert('AC2 all sources hides speaker_label token', !text(allSources).includes('speaker_label'));
      assert('AC2 mixed sections hides speaker_label token', !text(mixed).includes('speaker_label'));

      const mixedHeaders = headers(mixed);
      assert('AC3 attendees section first by header text', text(mixed).indexOf(copy.sectionAttendees) < text(mixed).indexOf(copy.sectionMentioned));
      assert('AC3 attendees section first by header order', mixedHeaders[0] === copy.sectionAttendees && mixedHeaders[1] === copy.sectionMentioned);
      assert('AC3 preserves sectioned card counts', cards(mixed).length === 4 && mixedHeaders.length === 2);
      const unknownHeaders = headers(unknown);
      assert('AC3 zero-entry attendees section absent', !unknownHeaders.includes(copy.sectionAttendees) && unknownHeaders.includes(copy.sectionMentioned));

      const pazCard = cardFor(missingConfidence, 'Paz');
      assert('AC4 invalid present confidence renders entry', !!pazCard);
      assert('AC4 invalid present confidence renders muted', pazCard?.classList.contains('ad-participation-card--muted'));
      assert('AC4 invalid present confidence shows adjacent certainty tag', !!pazCard?.querySelector('.ad-participation-name + .ad-participation-less-certain'));
      assert('AC4 missing confidence skips without error', !text(missingConfidence).includes('Ona') && !text(missingConfidence).includes(copy.unavailable) && cards(missingConfidence).length === 1);

      assert('AC4 0.4 confidence muted', cardFor(confidence, 'Juna')?.classList.contains('ad-participation-card--muted'));
      assert('AC4 0.5 confidence default', !cardFor(confidence, 'Koa')?.classList.contains('ad-participation-card--muted'));
      assert('AC4 0.7 confidence default', !cardFor(confidence, 'Lio')?.classList.contains('ad-participation-card--muted'));
      assert('AC4 1.5 confidence muted', cardFor(confidence, 'Mavi')?.classList.contains('ad-participation-card--muted'));

      assert('AC5 empty participation copy', text(empty).trim() === copy.empty);
      assert('AC5 empty omits sections', !empty.querySelector('section') && !text(empty).includes(copy.sectionAttendees) && !text(empty).includes(copy.sectionMentioned));

      assert('AC6 malformed JSON unavailable copy', text(malformed).trim() === copy.unavailable);
      assert('AC6 malformed omits JSON braces', !text(malformed).includes('{') && !text(malformed).includes('}'));
      assert('AC6 bad top-level shape unavailable copy', text(badShape).trim() === copy.unavailable);
      assert('AC6 bad top-level shape omits JSON braces', !text(badShape).includes('{') && !text(badShape).includes('}'));
      assert('AC6 invalid per-entry shape skips silently', !!cardFor(shapeMismatch, 'Quin') && !text(shapeMismatch).includes('Remi') && !text(shapeMismatch).includes(copy.unavailable));

      assert('AC7 unknown source falls back to other phrase', text(unknown).includes(copy.provOther));

      assert('AC8 large fixture renders at least 200 cards', cards(large).length >= 200);
      assert('AC8 large fixture renders every card', cards(large).length === 225);
      assert('AC8 large attendees before mentioned', text(large).indexOf(copy.sectionAttendees) < text(large).indexOf(copy.sectionMentioned));

      summary.className = failures ? 'fail' : 'pass';
      summary.textContent = failures
        ? `FAIL activities participation render: ${failures} failure(s)`
        : 'PASS activities participation render: 0 failure(s)';
    }

    try {
      runTests();
    } catch (error) {
      failures += 1;
      report('uncaught exception', false, error && error.message ? error.message : String(error));
      summary.className = 'fail';
      summary.textContent = `FAIL activities participation render: ${failures} failure(s)`;
    }
