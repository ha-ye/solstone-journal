<section class="chat-app" data-day="{{ day }}" data-today="{{ today_day }}">
  <header class="chat-app-search">
    <form id="chatSearchForm" class="chat-search-form" role="search">
      <label class="visually-hidden" for="chatSearchInput">search chat</label>
      <input id="chatSearchInput" type="search" placeholder="search chat history" autocomplete="off">
    </form>
    <div id="chatSearchResults" class="chat-search-results" hidden></div>
  </header>

  <ol id="chatTranscript" class="chat-transcript" data-owner-name="{{ owner_name }}" data-agent-name="{{ agent_name }}">
    {% if not events %}
      <li class="chat-empty">no chat yet on this day</li>
    {% endif %}
    {% for ev in events %}
      {% set event_origin = sol_message_origins.get(loop.index0) if sol_message_origins is defined else none %}
      <li
        id="event-{{ loop.index0 }}"
        class="chat-event {% if ev.kind == 'owner_message' %}chat-event--owner{% elif ev.kind == 'sol_message' %}chat-event--sol{% elif ev.kind == 'chat_error' %}chat-event--error{% else %}chat-event--talent{% endif %}"
        data-kind="{{ ev.kind }}"
        data-ts="{{ ev.ts }}"
        {% if ev.kind == "sol_message" and ev.notes %}data-notes="{{ ev.notes }}"{% endif %}
        {% if ev.kind == "sol_message" and event_origin and event_origin.request_id %}data-request-id="{{ event_origin.request_id }}"{% endif %}
      >
        {% include "chat/_chat_event.html" %}
      </li>
    {% endfor %}
  </ol>

</section>

<style>
  .chat-talent-card--stalled {
    border-left: 3px solid var(--warn-amber, #d39b2c);
    opacity: 0.78;
  }

  .chat-talent-card-stalled-note {
    color: var(--warn-amber, #a66d00);
    font-size: 0.9em;
    margin-top: 4px;
  }

  .chat-talent-card-detail--markdown[data-markdown="1"] {
    visibility: hidden;
  }
</style>

<script>
(function () {
  const root = document.querySelector('.chat-app');
  if (!root) return;

  const day = root.dataset.day;
  const todayDay = root.dataset.today;
  const isToday = day === todayDay;
  const transcript = document.getElementById('chatTranscript');
  const ownerName = transcript.dataset.ownerName;
  const agentName = transcript.dataset.agentName;
  const searchInput = document.getElementById('chatSearchInput');
  const searchResults = document.getElementById('chatSearchResults');
  const timeFormatter = new Intl.DateTimeFormat([], {
    hour: 'numeric',
    minute: '2-digit'
  });
	  const originCopy = {
	    withTalent: {{ sol_voice_copy.CHAT_ORIGIN_TAG_WITH_TALENT | tojson }},
	    withoutTalent: {{ sol_voice_copy.CHAT_ORIGIN_TAG_WITHOUT_TALENT | tojson }},
	    supersededSuffix: {{ sol_voice_copy.CHAT_ORIGIN_SUPERSEDED_SUFFIX | tojson }},
    show: {{ sol_voice_copy.CHAT_ORIGIN_PROVENANCE_SHOW | tojson }},
    hide: {{ sol_voice_copy.CHAT_ORIGIN_PROVENANCE_HIDE | tojson }},
    triggerTalentLabel: {{ sol_voice_copy.CHAT_ORIGIN_PROVENANCE_LABEL_TRIGGER_TALENT | tojson }},
	    dedupeLabel: {{ sol_voice_copy.CHAT_ORIGIN_PROVENANCE_LABEL_DEDUPE | tojson }},
	    sinceTsLabel: {{ sol_voice_copy.CHAT_ORIGIN_PROVENANCE_LABEL_SINCE_TS | tojson }}
	  };
	  const thinkingSurfaces = {{ thinking_surfaces | tojson }};
	  const CHAT_TALENT_STALL_MS = 3 * 60 * 1000;
  let searchTimer = null;
  let chatEventsCleanup = null;
  let pendingSolChatRequest = null;
  const pendingPlaceholders = [];

  insertTimeSeparators(transcript);
  decorateBubbles(transcript);

  function initChatWorkspace() {
    bootstrapMarkdownDetails(transcript);

    if (isToday && window.appEvents) {
      chatEventsCleanup = window.appEvents.listen('chat', {
        schema: ['kind'],
        correlationKey: 'use_id',
        timeout: CHAT_TALENT_STALL_MS,
        onDrop: (err) => window.logError(err, { context: 'chat: listener drop' }),
        onTimeout: handleChatTalentTimeout,
      }, (msg) => {
        appendEventFromLive(msg, transcript);
      });
      window.addEventListener('beforeunload', chatEventsCleanup, { once: true });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initChatWorkspace);
  } else {
    initChatWorkspace();
  }

  transcript.addEventListener('click', (event) => {
    const retryButton = event.target.closest('button.chat-error-retry');
    if (retryButton) {
      event.preventDefault();
      if (retryButton.disabled) return;
      const text = retryButton.dataset.retryText || '';
      if (!text) return;
      retryButton.disabled = true;
      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          app: 'chat',
          path: window.location.pathname,
          facet: window.selectedFacet || null,
        }),
      }).then((response) => {
        if (!response.ok) retryButton.disabled = false;
      }).catch(() => {
        retryButton.disabled = false;
      });
      return;
	    }
	
	    const thinkingExpander = event.target.closest('button.chat-thinking-expander');
	    if (thinkingExpander) {
	      event.preventDefault();
	      toggleThinkingSurface(thinkingExpander);
	      return;
	    }
	
	    const originToggle = event.target.closest('[data-origin-toggle]');
	    if (originToggle) {
	      event.preventDefault();
      toggleOriginProvenance(originToggle);
      return;
    }

    const target = event.target.closest('[data-talent-use-id]');
    if (!target) return;
    event.preventDefault();
    window.openTalentView?.(target.dataset.talentUseId, {
      live: target.dataset.talentStatus === 'active'
    });
  });

  wireSearch();

  if (location.hash && location.hash.startsWith('#event-')) {
    document.getElementById(location.hash.slice(1))?.scrollIntoView({ block: 'center' });
  } else {
    const owners = transcript.querySelectorAll('.chat-event[data-kind="owner_message"]');
    const lastOwner = owners[owners.length - 1];
    if (!lastOwner) {
      transcript.scrollTop = transcript.scrollHeight;
    } else if (transcript.scrollHeight > transcript.clientHeight + 8) {
      lastOwner.scrollIntoView({ block: 'start' });
    }
  }

  function insertTimeSeparators(list) {
    Array.from(list.querySelectorAll('.chat-time-sep')).forEach((node) => node.remove());
    const items = Array.from(list.querySelectorAll('.chat-event:not([data-kind="sol_placeholder"])'));
    let previousTs = null;

    items.forEach((item) => {
      const ts = Number(item.dataset.ts || 0);
      if (previousTs && ts && ts - previousTs > 20 * 60 * 1000) {
        const separator = document.createElement('li');
        separator.className = 'chat-time-sep';
        separator.textContent = timeFormatter.format(new Date(ts));
        list.insertBefore(separator, item);
      }
      if (ts) previousTs = ts;
    });
  }

  function decorateBubbles(list) {
    const items = Array.from(list.querySelectorAll('.chat-event:not([data-kind="sol_placeholder"])'));
    items.forEach((item) => {
      item.classList.remove(
        'chat-event--owner',
        'chat-event--sol',
        'chat-event--talent',
        'chat-event--error'
      );

      const kind = item.dataset.kind || '';
      if (kind === 'owner_message') {
        item.classList.add('chat-event--owner');
      } else if (kind === 'sol_message') {
        item.classList.add('chat-event--sol');
        const bubble = item.querySelector('.chat-bubble--sol');
        if (bubble && item.dataset.notes) {
          bubble.title = item.dataset.notes;
        }
      } else if (kind === 'chat_error') {
        item.classList.add('chat-event--error');
      } else {
        item.classList.add('chat-event--talent');
      }
    });
  }

  function bootstrapMarkdownDetails(list) {
    const nodes = Array.from(list.querySelectorAll('[data-markdown="1"]'));
    nodes.forEach((node) => {
      renderTalentMarkdownInto(node, node.textContent || '');
    });
    const remaining = list.querySelectorAll('[data-markdown="1"]');
    if (remaining.length) {
      throw new Error('unrendered talent markdown details remain');
    }
  }

  function renderTalentMarkdownInto(node, source) {
    // Single path from markdown source to rendered HTML for talent card details.
    // SSR initial-transcript bootstrap and live-append flow both route here.
    if (!window.AppServices || typeof window.AppServices.renderMarkdown !== 'function') {
      throw new Error('talent markdown renderer is unavailable');
    }
    node.innerHTML = window.AppServices.renderMarkdown(source || '');
    node.removeAttribute('data-markdown');
  }

	  function toggleOriginProvenance(button) {
	    const host = button.closest('[data-origin-toggle-host]');
	    const provenance = host?.querySelector('.chat-origin-provenance');
	    if (!provenance) return;
	    const nextHidden = !provenance.hidden;
	    provenance.hidden = nextHidden;
	    button.textContent = nextHidden ? originCopy.show : originCopy.hide;
	  }
	
	  function toggleThinkingSurface(button) {
	    const content = document.getElementById(button.dataset.thinkingId || '');
	    if (!content) return;
	    const nextExpanded = button.getAttribute('aria-expanded') !== 'true';
	    button.setAttribute('aria-expanded', String(nextExpanded));
	    content.hidden = !nextExpanded;
	    button.textContent = nextExpanded
	      ? window.solChatCopy.CHAT_THINKING_COLLAPSER_LABEL
	      : window.solChatCopy.CHAT_THINKING_EXPANDER_LABEL;
	  }

  function handleSolChatRequestSuperseded(msg, ts) {
    const supersededRequestId = msg.request_id || '';
    if (!supersededRequestId) return;

    if (pendingSolChatRequest?.request_id === supersededRequestId) {
      pendingSolChatRequest = null;
    }

    annotateRenderedOriginSupersede(supersededRequestId, ts);
  }

  function annotateRenderedOriginSupersede(requestId, ts) {
    const item = transcript.querySelector(`[data-request-id="${CSS.escape(requestId)}"]`);
    const label = item?.querySelector('.chat-origin-tag__label');
    if (!label || label.dataset.superseded === 'true') return;
    label.textContent += originCopy.supersededSuffix.replace('{time}', formatOriginTime(ts));
    label.dataset.superseded = 'true';
  }

  function formatOriginTime(ts) {
    const numericTs = Number(ts || 0);
    if (!Number.isFinite(numericTs) || numericTs <= 0) {
      return '';
    }
    return timeFormatter.format(new Date(numericTs));
  }

  function renderOriginTag(meta) {
    const tag = document.createElement('div');
    tag.className = 'chat-origin-tag';
    tag.dataset.originToggleHost = '';

    const label = document.createElement('span');
    label.className = 'chat-origin-tag__label';
    label.textContent = formatOriginLabel(meta);
    tag.appendChild(label);

    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'chat-origin-tag__toggle';
    button.dataset.originToggle = '';
    button.textContent = originCopy.show;
    tag.appendChild(button);

    const provenance = document.createElement('div');
    provenance.className = 'chat-origin-provenance';
    provenance.hidden = true;
    appendOriginProvenanceValue(provenance, originCopy.triggerTalentLabel, meta.trigger_talent || '');
    appendOriginProvenanceValue(provenance, originCopy.dedupeLabel, meta.dedupe || '');
    appendOriginProvenanceValue(provenance, originCopy.sinceTsLabel, meta.since_ts || '');
    tag.appendChild(provenance);

    return tag;
  }

  function formatOriginLabel(meta) {
    const time = formatOriginTime(meta.ts);
    if (meta.trigger_talent) {
      return originCopy.withTalent
        .replace('{trigger_talent}', meta.trigger_talent)
        .replace('{time}', time);
    }
    return originCopy.withoutTalent.replace('{time}', time);
  }

  function appendOriginProvenanceValue(provenance, labelText, value) {
    const span = document.createElement('span');
    const label = document.createElement('strong');
    label.textContent = labelText;
    span.appendChild(label);
    span.appendChild(document.createTextNode(' ' + value));
    provenance.appendChild(span);
  }

  function appendEventFromLive(msg, list) {
    const kind = String(msg.kind || msg.event || '').trim();
    if (!kind) return;

    const ts = Number(msg.ts || Date.now());
    if (formatDay(ts) !== day) return;

    if (kind === 'sol_chat_request') {
      pendingSolChatRequest = {
        request_id: msg.request_id || '',
        summary: msg.summary || '',
        trigger_talent: msg.trigger_talent || '',
        dedupe: msg.dedupe || '',
        since_ts: msg.since_ts || '',
        category: msg.category || '',
        ts: ts
      };
      return;
    }

    if (kind === 'sol_chat_request_superseded') {
      handleSolChatRequestSuperseded(msg, ts);
      return;
    }

    if (kind === 'owner_chat_open' || kind === 'owner_chat_dismissed') {
      return;
    }

    if ((kind === 'sol_message' || kind === 'chat_error') && pendingPlaceholders.length > 0) {
      const placeholder = pendingPlaceholders.shift();
      if (placeholder.element && placeholder.element.parentNode) {
        placeholder.element.parentNode.removeChild(placeholder.element);
      }
      if (kind === 'chat_error') {
        msg._retryText = placeholder.ownerText;
      }
    }

    const origin = kind === 'sol_message' && pendingSolChatRequest
      ? pendingSolChatRequest
      : null;
    if (origin) {
      pendingSolChatRequest = null;
    }

    const item = renderEventItem({
      kind: kind,
      ts: ts,
      text: msg.text || '',
      notes: msg.notes || '',
      use_id: msg.use_id || '',
      name: msg.name || '',
      task: msg.task || '',
      summary: msg.summary || '',
      reason: msg.reason || '',
      day: msg.day || '',
	      url: msg.url || '',
	      origin: origin,
	      thinking: msg.thinking || null,
	      _retryText: msg._retryText || ''
	    });
    if (!item) return;

    list.querySelector('.chat-empty')?.remove();
    list.appendChild(item);
    if (kind === 'owner_message') {
      const placeholder = document.createElement('li');
      placeholder.className = 'chat-event chat-event--sol chat-event--placeholder';
      placeholder.dataset.kind = 'sol_placeholder';
      placeholder.dataset.ts = String(ts || Date.now());
      const article = document.createElement('article');
      article.className = 'chat-bubble chat-bubble--sol chat-bubble--placeholder';
      const span = document.createElement('span');
      span.className = 'chat-bubble-text';
      span.textContent = window.solChatCopy.CHAT_LIVENESS_THINKING;
      article.appendChild(span);
      placeholder.appendChild(article);
      list.appendChild(placeholder);
      pendingPlaceholders.push({ element: placeholder, ownerText: String(msg.text || ''), ts: ts });
    }
    if (kind === 'talent_spawned' && pendingPlaceholders.length > 0) {
      const head = pendingPlaceholders[0];
      const task = String(msg.task || '').trim();
      if (task) {
        try {
          const label = window.solChatCopy.talentLabel(String(msg.name || ''), 'running');
          const format = window.solChatCopy.CHAT_LIVENESS_TASK_FORMAT;
          const composed = format.replace('{label}', label).replace('{task}', task);
          const span = head.element.querySelector('.chat-bubble-text');
          if (span) span.textContent = composed;
        } catch (_err) {
          /* unknown talent target — keep phase-1 text */
        }
      }
    }
    if (kind === 'talent_spawned' && msg.use_id) {
      chatEventsCleanup?.pending?.track(msg.use_id);
    }
    decorateBubbles(list);
    insertTimeSeparators(list);
    list.scrollTop = list.scrollHeight;
  }

  function renderEventItem(event) {
    if (![
      'owner_message',
      'sol_message',
      'talent_spawned',
      'talent_finished',
      'talent_errored',
      'reflection_ready',
      'chat_error',
      'sol_chat_request',
      'sol_chat_request_superseded',
      'owner_chat_open',
      'owner_chat_dismissed'
    ].includes(event.kind)) {
      return null;
    }

    if ([
      'sol_chat_request',
      'sol_chat_request_superseded',
      'owner_chat_open',
      'owner_chat_dismissed'
    ].includes(event.kind)) {
      return null;
    }

    const item = document.createElement('li');
    item.id = 'event-' + transcript.querySelectorAll('.chat-event:not([data-kind="sol_placeholder"])').length;
    item.className = 'chat-event';
    item.dataset.kind = event.kind;
    item.dataset.ts = String(event.ts);
    if (event.kind === 'sol_message' && event.notes) {
      item.dataset.notes = event.notes;
    }
	    if (event.kind === 'sol_message' && event.origin?.request_id) {
	      item.dataset.requestId = event.origin.request_id;
	    }
	    event._thinkingId = item.id + '-thinking';
	    item.appendChild(renderEventBody(event));
	    return item;
	  }
	
	  function renderEventBody(event) {
	    if (event.kind === 'owner_message') {
	      return buildBubble(ownerName, event.text, 'owner', '');
	    }
	    if (event.kind === 'sol_message') {
	      const bubble = buildBubble(agentName, event.text, 'sol', event.notes || '');
	      const fragment = document.createDocumentFragment();
	      if (event.origin) {
	        fragment.appendChild(renderOriginTag(event.origin));
	      }
	      fragment.appendChild(bubble);
	      return withThinkingSurface(fragment, event);
	    }
	    if (event.kind === 'talent_spawned') {
	      return buildTalentCard(window.solChatCopy.talentLabel(event.name, 'running'), event.task || '', event.use_id, 'active', 'chat-talent-card--spawned');
	    }
	    if (event.kind === 'talent_finished') {
	      return withThinkingSurface(
	        buildTalentCard(window.solChatCopy.talentLabel(event.name, 'finished'), event.summary || '', event.use_id, 'finished', 'chat-talent-card--finished'),
	        event
	      );
	    }
    if (event.kind === 'talent_errored') {
      return buildTalentCard(window.solChatCopy.talentLabel(event.name, 'errored'), event.reason || '', event.use_id, 'errored', 'chat-talent-card--errored');
    }
    if (event.kind === 'reflection_ready') {
      return buildReflectionCard(event.day || '', event.url || '');
    }

    const renderedReason = window.renderChatReason
      ? window.renderChatReason(event.reason || 'unknown', event.provider || '')
      : {message: event.reason || 'unknown'};
    const block = document.createElement('div');
    block.className = 'chat-error-block';
    const message = document.createElement('div');
    message.textContent = renderedReason.message;
    block.appendChild(message);
    if (event.detail) {
      const detail = document.createElement('div');
      detail.className = 'chat-error-detail';
      const code = document.createElement('code');
      code.textContent = event.detail;
      detail.appendChild(code);
      block.appendChild(detail);
    }
    if (event._retryText) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'chat-error-retry';
      button.dataset.retryText = event._retryText;
      const excerpt = (window.solChatCopy && window.solChatCopy.chatErrorRetryExcerpt)
        ? window.solChatCopy.chatErrorRetryExcerpt(event._retryText)
        : event._retryText.slice(0, 60);
      const ariaFormat = (window.solChatCopy && window.solChatCopy.CHAT_ERROR_RETRY_ARIA_FORMAT)
        ? window.solChatCopy.CHAT_ERROR_RETRY_ARIA_FORMAT
        : 'Try again — re-send: {excerpt}';
      button.setAttribute('aria-label', ariaFormat.replace('{excerpt}', excerpt));
      button.textContent = (window.solChatCopy && window.solChatCopy.CHAT_ERROR_RETRY_LABEL) || 'Try again';
      block.appendChild(button);
    }
	    return block;
	  }
	
	  function withThinkingSurface(node, event) {
	    const thinkingNode = buildThinkingSurface(event.thinking, event._thinkingId);
	    if (!thinkingNode) return node;
	    const fragment = document.createDocumentFragment();
	    fragment.appendChild(node);
	    fragment.appendChild(thinkingNode);
	    return fragment;
	  }
	
	  function buildThinkingSurface(thinking, thinkingId) {
	    const contentText = String(thinking?.content || '');
	    if (!contentText.trim() || thinkingSurfaces === 'never') return null;
	
	    const content = document.createElement('div');
	    content.className = 'chat-thinking-content';
	    content.id = thinkingId;
	    content.textContent = contentText;
	
	    if (thinkingSurfaces === 'always') {
	      return content;
	    }
	
	    const fragment = document.createDocumentFragment();
	    const button = document.createElement('button');
	    button.type = 'button';
	    button.className = 'chat-thinking-expander';
	    button.dataset.thinkingId = thinkingId;
	    button.setAttribute('aria-expanded', 'false');
	    button.textContent = window.solChatCopy.CHAT_THINKING_EXPANDER_LABEL;
	    content.hidden = true;
	    fragment.appendChild(button);
	    fragment.appendChild(content);
	    return fragment;
	  }

  function buildBubble(author, text, side, notes) {
    const bubble = document.createElement('article');
    bubble.className = 'chat-bubble chat-bubble--' + side;
    bubble.setAttribute('aria-label', author + ': ' + text);
    if (notes) bubble.title = notes;

    const authorNode = document.createElement('span');
    authorNode.className = 'chat-bubble-author';
    authorNode.textContent = author;

    const textNode = document.createElement('span');
    textNode.className = 'chat-bubble-text';
    textNode.textContent = text;

    bubble.appendChild(authorNode);
    bubble.appendChild(textNode);
    return bubble;
  }

  function buildTalentCard(label, detail, useId, status, variantClass) {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'chat-talent-card ' + variantClass;
    card.dataset.talentUseId = useId;
    card.dataset.talentStatus = status;

    const labelNode = document.createElement('span');
    labelNode.className = 'chat-talent-card-label';
    labelNode.textContent = label;
    card.appendChild(labelNode);

    if (detail) {
      if (status === 'finished' || status === 'errored') {
        const detailNode = document.createElement('div');
        detailNode.className = 'chat-talent-card-detail chat-talent-card-detail--markdown';
        renderTalentMarkdownInto(detailNode, detail || '');
        card.appendChild(detailNode);
      } else {
        const detailNode = document.createElement('span');
        detailNode.className = 'chat-talent-card-detail';
        detailNode.textContent = detail;
        card.appendChild(detailNode);
      }
    }

    return card;
  }

  function handleChatTalentTimeout(useId) {
    if (!useId) return;
    const cards = transcript.querySelectorAll(`[data-talent-use-id="${CSS.escape(useId)}"]`);
    cards.forEach((card) => {
      if (card.dataset.talentStatus === 'finished' || card.dataset.talentStatus === 'errored') {
        return;
      }
      card.dataset.talentStatus = 'stalled';
      card.classList.remove('chat-talent-card--spawned');
      card.classList.add('chat-talent-card--stalled');
      let note = card.querySelector('.chat-talent-card-stalled-note');
      if (!note) {
        note = document.createElement('span');
        note.className = 'chat-talent-card-stalled-note';
        card.appendChild(note);
      }
      note.textContent = `talent stopped responding — ${window.CONVEY_COPY.RELOAD_HINT}`;
    });
  }

  function buildReflectionCard(dayValue, url) {
    const card = document.createElement('article');
    card.className = 'chat-reflection-card';

    const labelNode = document.createElement('span');
    labelNode.className = 'chat-reflection-card-label';
    labelNode.textContent = 'weekly reflection ready';
    card.appendChild(labelNode);

    const weekNode = document.createElement('span');
    weekNode.className = 'chat-reflection-card-week';
    weekNode.textContent = 'week of ' + dayValue;
    card.appendChild(weekNode);

    const linkNode = document.createElement('a');
    linkNode.className = 'chat-reflection-card-link';
    linkNode.href = url;
    linkNode.textContent = 'open reflection';
    card.appendChild(linkNode);

    return card;
  }

  function wireSearch() {
    if (!searchInput || !searchResults) return;
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim();
      window.clearTimeout(searchTimer);
      if (!query) {
        searchResults.hidden = true;
        searchResults.innerHTML = '';
        return;
      }

      searchTimer = window.setTimeout(() => {
        runSearch(query);
      }, 150);
    });
  }

  async function runSearch(query) {
    searchResults.hidden = false;
    searchResults.innerHTML = '<p class="chat-search-status">searching…</p>';

    try {
      const params = new URLSearchParams({
        q: query,
        stream: 'chat',
        day_from: '00000000',
        day_to: '99999999'
      });
      const response = await fetch('/app/search/api/search?' + params.toString());
      if (!response.ok) throw new Error('search failed');
      const payload = await response.json();
      renderSearchResults(payload);
    } catch (_error) {
      searchResults.innerHTML = '<p class="chat-search-status">search failed</p>';
    }
  }

  function renderSearchResults(payload) {
    const rows = [];
    (payload.days || []).forEach((group) => {
      (group.results || []).forEach((row) => {
        rows.push({
          day: row.day || group.day,
          date: group.date || row.day,
          idx: row.idx,
          text: row.text || ''
        });
      });
    });

    searchResults.innerHTML = '';
    if (!rows.length) {
      searchResults.innerHTML = '<p class="chat-search-status">no matches</p>';
      return;
    }

    const list = document.createElement('ul');
    list.className = 'chat-search-result-list';

    rows.forEach((row) => {
      const item = document.createElement('li');
      const link = document.createElement('a');
      const meta = document.createElement('span');
      const text = document.createElement('span');

      link.href = '/app/chat/' + row.day + '#event-' + row.idx;
      link.className = 'chat-search-result-link';

      meta.className = 'chat-search-result-day';
      meta.textContent = row.date;

      text.className = 'chat-search-result-text';
      text.innerHTML = row.text;

      link.appendChild(meta);
      link.appendChild(text);
      item.appendChild(link);
      list.appendChild(item);
    });

    searchResults.appendChild(list);
  }

  function formatDay(ts) {
    const value = new Date(ts);
    return value.getFullYear() +
      String(value.getMonth() + 1).padStart(2, '0') +
      String(value.getDate()).padStart(2, '0');
  }
})();
</script>
